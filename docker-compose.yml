services:
  # Harmless Ollama-shaped mock API for local metadata checks on 127.0.0.1:11434.
  mock-ollama:
    build: ./lab_services/mock_ollama
    ports:
      - "127.0.0.1:11434:11434"

  # Harmless vLLM-shaped OpenAI-compatible mock API for local checks on 127.0.0.1:8000.
  mock-vllm:
    build: ./lab_services/mock_vllm
    ports:
      - "127.0.0.1:8000:8000"

  # Harmless Open WebUI-shaped mock UI for local browser/header checks on 127.0.0.1:8080.
  mock-open-webui:
    build: ./lab_services/mock_open_webui
    ports:
      - "127.0.0.1:8080:8080"

  # Intentionally weak local proxy example for config review on 127.0.0.1:8081.
  nginx-insecure:
    image: nginx:1.27-alpine
    ports:
      - "127.0.0.1:8081:80"
    volumes:
      - ./lab_services/nginx/insecure.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - mock-open-webui

  # Hardened local proxy example for comparison on 127.0.0.1:8082.
  nginx-hardened:
    image: nginx:1.27-alpine
    ports:
      - "127.0.0.1:8082:80"
    volumes:
      - ./lab_services/nginx/hardened.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - mock-open-webui
